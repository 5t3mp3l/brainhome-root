services:

  # ─────────────────────────────────────────────
  # Grafana – Dashboard & Visualisierung
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:${GRAFANA_VERSION:-latest}
    container_name: grafana
    restart: unless-stopped
    user: "472"
    ports:
      - "3000:3000"             # Für Caddy-Upstream erreichbar im LAN
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.brain}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    volumes:
      - ../data/grafana:/var/lib/grafana
      - ../config/grafana.ini:/etc/grafana/grafana.ini:ro
      - ../config/datasources:/etc/grafana/provisioning/datasources:ro
      - ../config/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../dashboards/provisioned:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring

  # ─────────────────────────────────────────────
  # Prometheus – Metriken-Scraping & Storage
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"   # Nur localhost – kein externer Zugriff
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-90d}"
      - "--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-20GB}"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../docker/secrets/ha_ug_token:/run/secrets/ha_ug_token:ro
      - ../docker/secrets/ha_eg_token:/run/secrets/ha_eg_token:ro
      - ../docker/secrets/ha_og_token:/run/secrets/ha_og_token:ro
      - ../docker/secrets/ha_master_token:/run/secrets/ha_master_token:ro
      - ../docker/secrets/ha_ga_token:/run/secrets/ha_ga_token:ro
      - ../data/prometheus:/prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Loki – Log-Aggregation
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:${LOKI_VERSION:-latest}
    container_name: loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"   # Nur localhost
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ../data/loki:/loki
    networks:
      - monitoring

networks:
  monitoring:
    name: brainhome_monitoring
    driver: bridge
